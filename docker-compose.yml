services:
  postgres:
    image: postgres:18
    container_name: pg18
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./database/pgdata:/var/lib/postgresql
      - ./database/init:/docker-entrypoint-initdb.d

volumes:
  pgdata: