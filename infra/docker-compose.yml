services:
  postgres:
    image: postgres:18
    container_name: pg18
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./database/pgdata:/var/lib/postgresql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - internal

  backend:
    build: ../backend
    container_name: fastapi_app
    # ports:
    # - "8000:8000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: postgres
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - postgres
    volumes:
      - ../backend:/app
    networks:
      - internal
    
  frontend:
    build: ../frontend
    container_name: frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
    - ../certs:/etc/nginx/certs:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge